name: Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm skills:generate
      - run: pnpm score
      - run: pnpm catalog:generate
      - run: pnpm validate
      - run: pnpm package:flagships
      - run: pnpm package:collections
      - run: pnpm benchmark:run
      - run: git diff --exit-code
