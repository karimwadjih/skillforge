version: 1
skill:
  name: Agent Handoff Designer
  slug: agent-handoff-designer
  category: frontier
  maturity: experimental
  description: Use when an agent workflow crosses stages and the handoff needs more structure and fewer assumptions.
  triggers:
    - A workflow has multiple agent or human-agent stages.
    - A handoff contract needs to be specified to reduce dropped context.
  expected_inputs:
    - workflow stages
    - handoff points
    - required context
  expected_outputs:
    - handoff design
    - contract notes
    - failure points
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
