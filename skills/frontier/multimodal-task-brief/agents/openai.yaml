version: 1
skill:
  name: Multimodal Task Brief
  slug: multimodal-task-brief
  category: frontier
  maturity: experimental
  description: Use when a workflow includes multiple modalities and needs a clear input and output contract.
  triggers:
    - A task involves text plus image or media inputs.
    - The team needs a cleaner multimodal task brief.
  expected_inputs:
    - task goal
    - modalities involved
    - constraints
    - expected outputs
  expected_outputs:
    - task brief
    - modality handling notes
    - output contract
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
