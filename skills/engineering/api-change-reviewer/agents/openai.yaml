version: 1
skill:
  name: API Change Reviewer
  slug: api-change-reviewer
  category: engineering
  maturity: frontier
  description: Use when an API change needs a contract review that goes beyond the diff.
  triggers:
    - An API shape or default is changing and downstream consumers may break or behave differently.
    - A seemingly small contract change could hide migration, deprecation, or observability risk.
  expected_inputs:
    - current API contract or behavior
    - proposed change
    - known consumers or consumer types
    - rollout, deprecation, or migration plan
    - known monitoring or support constraints
  expected_outputs:
    - API review brief
    - compatibility analysis
    - consumer-risk map
    - rollout and migration recommendations
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
