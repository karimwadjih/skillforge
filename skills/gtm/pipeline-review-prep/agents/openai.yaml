version: 1
skill:
  name: Pipeline Review Prep
  slug: pipeline-review-prep
  category: gtm
  maturity: experimental
  description: Use when pipeline review prep needs to focus on signal and decisions instead of record recitation.
  triggers:
    - A pipeline review meeting needs a better prep artifact.
    - Leaders need a concise view of movement, risk, and next decisions.
  expected_inputs:
    - pipeline snapshot
    - deal notes
    - targets
    - known risks
  expected_outputs:
    - pipeline review brief
    - movement summary
    - risk callouts
    - decision prompts
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
