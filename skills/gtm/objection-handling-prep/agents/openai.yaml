version: 1
skill:
  name: Objection Handling Prep
  slug: objection-handling-prep
  category: gtm
  maturity: experimental
  description: Use when teams keep hearing the same objections and need consistent, credible responses.
  triggers:
    - A go-to-market team wants a better objection handling asset.
    - Repeated buyer or partner objections need structured prep.
  expected_inputs:
    - objection list
    - product context
    - proof points
    - known constraints
  expected_outputs:
    - objection guide
    - response options
    - evidence notes
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
