version: 1
skill:
  name: Benchmark Brief
  slug: benchmark-brief
  category: research
  maturity: frontier
  description: Use when a team needs a benchmark design or benchmark readout that is understandable, comparable, and honest about limits.
  triggers:
    - You need to design or explain an evaluation benchmark for an agent workflow.
    - Stakeholders are asking for benchmark results without understanding what the numbers mean.
  expected_inputs:
    - benchmark goal
    - cases or prompts
    - scoring dimensions
    - known limitations
  expected_outputs:
    - benchmark brief
    - measurement summary
    - interpretation notes
    - follow-up recommendations
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
