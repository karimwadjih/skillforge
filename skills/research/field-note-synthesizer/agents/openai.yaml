version: 1
skill:
  name: Field Note Synthesizer
  slug: field-note-synthesizer
  category: research
  maturity: experimental
  description: Use when observation notes are messy but still need to feed product, operations, or strategy decisions.
  triggers:
    - A team gathered observational notes and needs a reliable synthesis.
    - Field notes contain patterns that are easy to miss in raw form.
  expected_inputs:
    - field notes
    - observation goal
    - known constraints
  expected_outputs:
    - theme summary
    - anomalies
    - follow-up questions
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
