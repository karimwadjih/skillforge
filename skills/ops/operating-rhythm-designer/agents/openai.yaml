version: 1
skill:
  name: Operating Rhythm Designer
  slug: operating-rhythm-designer
  category: ops
  maturity: frontier
  description: Use when the problem is not just too many meetings, but weak decision cadence and poor operating discipline.
  triggers:
    - The team has too many meetings, too little decision clarity, or too much status noise between leaders.
    - An organization is scaling past founder or ad hoc coordination and needs a repeatable operating cadence.
  expected_inputs:
    - org shape and key functions
    - recurring decisions that need cadence support
    - metrics and reporting availability
    - existing meetings or rituals
    - known escalation failures
  expected_outputs:
    - operating rhythm design
    - meeting and artifact cadence map
    - owner assignments
    - escalation rules
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
