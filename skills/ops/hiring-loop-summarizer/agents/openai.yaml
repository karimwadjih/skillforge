version: 1
skill:
  name: Hiring Loop Summarizer
  slug: hiring-loop-summarizer
  category: ops
  maturity: experimental
  description: Use when interview feedback needs to become a coherent hiring decision artifact.
  triggers:
    - A hiring panel needs a better synthesis of interview feedback.
    - Interview notes exist but not a decision-ready summary.
  expected_inputs:
    - interview feedback
    - role rubric
    - known concerns
  expected_outputs:
    - loop summary
    - signal themes
    - decision support notes
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
