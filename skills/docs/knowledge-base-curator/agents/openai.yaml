version: 1
skill:
  name: Knowledge Base Curator
  slug: knowledge-base-curator
  category: docs
  maturity: experimental
  description: Use when a knowledge base has grown messy enough that structure, ownership, and article quality need review.
  triggers:
    - A knowledge base needs structure and cleanup.
    - Support or enablement content is difficult to navigate.
  expected_inputs:
    - article set
    - audience
    - content problems
  expected_outputs:
    - curation plan
    - article grouping
    - cleanup recommendations
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
