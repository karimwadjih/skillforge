version: 1
skill:
  name: Support Playbook Writer
  slug: support-playbook-writer
  category: docs
  maturity: experimental
  description: Use when support teams need a repeatable handling guide rather than tribal knowledge.
  triggers:
    - Support handling is inconsistent for a recurring issue type.
    - A support playbook needs to be drafted from scattered procedures.
  expected_inputs:
    - issue types
    - resolution notes
    - escalation rules
  expected_outputs:
    - support playbook
    - handling guidance
    - escalation map
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
