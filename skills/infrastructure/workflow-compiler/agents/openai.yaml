version: 1
skill:
  name: Workflow Compiler
  slug: workflow-compiler
  category: infrastructure
  maturity: frontier
  description: Use when a repeated human workflow needs to become a portable skill instead of a loose sequence of instructions.
  triggers:
    - A workflow is repeated often enough to encode into a reusable skill.
    - A team needs to turn human process knowledge into an explicit workflow package.
  expected_inputs:
    - workflow description
    - inputs
    - operators
    - failure conditions
    - desired outputs
  expected_outputs:
    - compiled workflow
    - skill scaffold
    - guardrails
    - test prompts
execution:
  default_behavior:
    - Ask for missing critical inputs only when they materially change the output.
    - Produce a structured artifact with explicit assumptions.
    - Preserve uncertainty rather than smoothing it over.
guardrails:
  - Do not invent evidence.
  - Distinguish facts from inference.
  - Match the maturity expectations of the skill.
